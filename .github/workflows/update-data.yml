name: Update Dashboard Data

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch data from OneDrive
        run: |
          curl -L \
            "https://groupiph-my.sharepoint.com/:u:/g/personal/simon_weaver_rubix-group_com/IQCQSbYWHlhWT6vs5f7tm4m4ARxWaPL2XFVOc7pg8CAssqA?e=mCKpqK&download=1&NoRedirect=1" \
            -o data.json \
            --fail \
            --silent \
            --show-error
          python3 -c "import json; json.load(open('data.json'))" || { echo "ERROR: Fetched content is not valid JSON — aborting commit"; exit 1; }

      - name: Commit and push if changed
        run: |
          git config user.name "Dashboard Bot"
          git config user.email "action@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Dashboard update $(date -u '+%d/%m/%Y %H:%M')"
          git push
