name: Update Dashboard Data

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch data from Google Drive
        run: |
          curl -L "https://drive.google.com/uc?export=download&id=1XF4p_2OrTKvNQEf6D6jFs0KKK_R0TJYn" \
            -o data.json \
            --fail \
            --silent \
            --show-error
          python3 -c "import json; json.load(open('data.json'))" || { echo "ERROR: Not valid JSON"; exit 1; }

      - name: Commit and push if changed
        run: |
          git config user.name "Dashboard Bot"
          git config user.email "action@github.com"
          cp data.json /tmp/data.json
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/data.json data.json
          git add data.json
          git diff --staged --quiet || git commit -m "Dashboard update $(date -u '+%d/%m/%Y %H:%M')"
          git push
