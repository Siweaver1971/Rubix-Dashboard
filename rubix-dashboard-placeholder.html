<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rubix Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #051E50;
    color: #ffffff;
    font-family: 'Trebuchet MS', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  /* Subtle radial depth */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 70% 70% at 50% 50%, #0a2d70 0%, #051E50 65%);
    pointer-events: none;
    z-index: 0;
  }

  /* Fine dot grid */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(circle, rgba(255,215,0,0.08) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  /* Yellow top bar */
  .bar-top {
    position: fixed; top: 0; left: 0; right: 0;
    height: 6px;
    background: #FFD700;
    z-index: 10;
  }

  /* Thin yellow bottom bar */
  .bar-bottom {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #051E50 0%, #FFD700 50%, #051E50 100%);
    z-index: 10;
  }

  /* Corner brackets */
  .corner {
    position: fixed;
    width: 32px; height: 32px;
    z-index: 5;
  }
  .corner::before, .corner::after {
    content: '';
    position: absolute;
    background: rgba(255,215,0,0.5);
  }
  .corner::before { width: 100%; height: 2px; }
  .corner::after  { width: 2px;  height: 100%; }
  .corner-tl { top: 20px; left: 20px; }
  .corner-tl::before { top: 0; left: 0; }
  .corner-tl::after  { top: 0; left: 0; }
  .corner-tr { top: 20px; right: 20px; }
  .corner-tr::before { top: 0; right: 0; }
  .corner-tr::after  { top: 0; right: 0; }
  .corner-bl { bottom: 20px; left: 20px; }
  .corner-bl::before { bottom: 0; left: 0; }
  .corner-bl::after  { bottom: 0; left: 0; }
  .corner-br { bottom: 20px; right: 20px; }
  .corner-br::before { bottom: 0; right: 0; }
  .corner-br::after  { bottom: 0; right: 0; }

  /* Main stage */
  .stage {
    position: relative; z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 0;
  }

  /* Logo */
  .logo-wrap {
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.1s forwards;
  }
  .logo-wrap img {
    height: 90px;
    width: auto;
  }

  /* Yellow rule */
  .rule {
    width: 80px;
    height: 3px;
    background: #FFD700;
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
  }

  /* Clock */
  .clock {
    font-family: 'Trebuchet MS', sans-serif;
    font-weight: bold;
    font-size: clamp(80px, 14vw, 160px);
    letter-spacing: 0.06em;
    line-height: 1;
    color: #ffffff;
    opacity: 0;
    animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
  }
  .clock .sep {
    color: #FFD700;
    animation: blink 1s step-start infinite;
    display: inline-block;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.1; }
  }

  /* Date */
  .date {
    margin-top: 24px;
    font-size: clamp(18px, 2.2vw, 30px);
    font-weight: normal;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    opacity: 0;
    animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.7s forwards;
  }
  .date .day-num {
    color: #FFD700;
    font-weight: bold;
  }

  /* Footer label */
  .footer-label {
    position: fixed;
    bottom: 16px; left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.18);
    z-index: 10;
    white-space: nowrap;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

<script>
  function pad(n) { return String(n).padStart(2, '0'); }

  const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];

  function tick() {
    const now = new Date();
    document.getElementById('hh').textContent = pad(now.getHours());
    document.getElementById('mm').textContent = pad(now.getMinutes());
    document.getElementById('ss').textContent = pad(now.getSeconds());
    document.getElementById('date').innerHTML =
      DAYS[now.getDay()] + ' <span class="day-num">' + now.getDate() + '</span> ' +
      MONTHS[now.getMonth()] + ' ' + now.getFullYear();
  }
  tick();
  setInterval(tick, 1000);
</script>
